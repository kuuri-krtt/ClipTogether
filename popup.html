<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClipTogether</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <header>
      <img src="icons/icon48.png" alt="" width="42" height="42">
      <div>
        <h1>ClipTogether</h1>
        <p class="tagline">Image + Source</p>
      </div>
    </header>

    <p class="description" data-i18n="popupDescription"></p>

    <section class="settings">
      <label for="stripFormatting">
        <span class="setting-copy">
          <strong data-i18n="stripFormatting"></strong>
          <small data-i18n="stripFormattingDescription"></small>
        </span>
        <span class="switch">
          <input type="checkbox" id="stripFormatting">
          <span class="switch-track" aria-hidden="true"></span>
        </span>
      </label>
    </section>

    <div class="footer">
      <span class="version"></span>
      <p id="status" role="status" aria-live="polite"></p>
    </div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
